name: Build and Deploy Jupyter Book

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper git info
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate TOC ↔ filesystem ↔ MODELS.md consistency
        run: python scripts/check_toc.py

      - name: Clean previous builds
        run: jupyter-book clean . --all

      - name: Build Jupyter Book
        run: jupyter-book build . --warningiserror --keep-going

      - name: Build JupyterLite (in-browser runtime)
        # Ships a static JupyterLite app at /lite/ with all canonical notebooks
        # preloaded. Students run any chapter with no install via Pyodide.
        run: |
          mkdir -p _build/html/lite
          jupyter lite build --contents content --output-dir _build/html/lite

      - name: Upload build artifacts (CI inspection)
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-book-html
          path: _build/html/
          retention-days: 7

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
