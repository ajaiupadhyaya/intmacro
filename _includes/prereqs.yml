# chapter_id (filename stem) -> metadata
solow_intro:
  track: growth
  title: "The Solow Growth Model"
  tldr: "Raise the savings rate and you get a richer country, not a faster-growing one — long-run growth is set by technology."
  prereqs: [cobb_d_prod, foundations_growth]
cobb_d_prod:
  track: growth
  title: "Cobb-Douglas Production"
  tldr: "Output from capital and labor with constant returns to scale; exponents are factor income shares."
  prereqs: [foundations_growth]
foundations_growth:
  track: growth
  title: "Levels vs. Growth Rates"
  tldr: "The level of GDP per capita and its growth rate are different things — and often move oppositely across countries."
  prereqs: []
solow_transition:
  track: growth
  title: "Solow Transition Dynamics"
  tldr: "Below steady state, capital grows faster than replacement, so the economy converges upward along a predictable path."
  prereqs: [solow_intro]
solow_pop&_tech_growth:
  track: growth
  title: "Population & Technology Growth"
  tldr: "Per-effective-worker variables settle at a steady state; living standards then grow only at the rate of technology, while faster population growth dilutes capital."
  prereqs: [solow_intro]
humancapital:
  track: growth
  title: "Human Capital"
  tldr: "A second accumulable factor alongside physical capital; raising human-capital investment lifts the steady-state level of income."
  prereqs: [solow_intro]
convergence_hypo:
  track: growth
  title: "The Convergence Hypothesis"
  tldr: "Economies sharing the same parameters converge to the same steady state (absolute); with different parameters they converge only to their own (conditional)."
  prereqs: [solow_transition]
romer_model:
  track: growth
  title: "The Romer Model"
  tldr: "Ideas are nonrival: growth comes from researchers producing knowledge everyone can use, so the growth rate itself is chosen inside the model."
  prereqs: [cobb_d_prod]
growth_acc:
  track: growth
  title: "Growth Accounting"
  tldr: "Decompose output growth into contributions from capital, labor, and the TFP residual — the part we cannot see directly."
  prereqs: [cobb_d_prod]
two_period_consumption:
  track: intertemporal
  title: "Two-Period Consumption"
  tldr: "A forward-looking agent splits lifetime wealth between today and tomorrow; the interest rate tilts the optimal split."
  prereqs: []
labor_leisure_model:
  track: intertemporal
  title: "The Labor-Leisure Choice"
  tldr: "How agents trade consumption against leisure given the real wage."
  prereqs: [two_period_consumption]
tobin_q_model:
  track: intertemporal
  title: "Investment and Tobin's q"
  tldr: "Firms invest when the market value of capital exceeds its replacement cost."
  prereqs: [two_period_consumption]
is_curve_model:
  track: business_cycles
  title: "The IS Curve"
  tldr: "Combinations of the interest rate and output that clear the goods market; higher r lowers demand and output."
  prereqs: []
adassim:
  track: business_cycles
  title: "Dynamic AD-AS with a Taylor Rule"
  tldr: "IS + Phillips curve + Taylor rule generate output and inflation dynamics; the Taylor principle (φπ>1) is what makes them converge."
  prereqs: [is_curve_model]
lucas_island_model:
  track: business_cycles
  title: "The Lucas Island Model"
  tldr: "When producers cannot tell relative from aggregate price changes, only monetary surprises move output — anticipated policy does nothing."
  prereqs: []
equilibrium_model:
  track: business_cycles
  title: "Equilibrium Cycles with Persistence"
  tldr: "One-off shocks generate drawn-out booms and recessions once capital and habits propagate them forward in time."
  prereqs: [lucas_island_model]
rbc_simulation:
  track: business_cycles
  title: "The Real Business Cycle Model"
  tldr: "Fluctuations as the economy's efficient response to technology shocks — no market failure required, which is exactly the controversy."
  prereqs: [equilibrium_model]
