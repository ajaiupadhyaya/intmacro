project:
  type: website
  output-dir: _site
  resources:
    - glossary-tooltips.json
  render:
    - "index.qmd"
    - "content/*.qmd"
    - "content/*.ipynb"
    - "tracks/*.qmd"
    - "_glossary.qmd"
    - "404.qmd"
    - "!content/_archive/**"
    - "!content/MODELS.md"

website:
  title: "Intermediate Macroeconomics"
  description: "An interactive course companion: every chapter builds one macroeconomic model and hands you the controls."
  site-url: https://ajaiupadhyaya.github.io/intmacro/
  favicon: theme/favicon.svg
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  repo-url: https://github.com/ajaiupadhyaya/intmacro
  repo-actions: [edit, issue]
  page-navigation: true
  page-footer:
    left: "Intermediate Macroeconomics — an interactive course companion. Every chapter hands you the controls."
    right:
      - text: "Source on GitHub"
        href: https://github.com/ajaiupadhyaya/intmacro
  navbar:
    background: light
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Glossary"
        href: _glossary.qmd
      - text: "Tracks"
        menu:
          - text: "Foundations & Measurement"
            href: tracks/measurement.qmd
          - text: "Growth & Long-Run Dynamics"
            href: tracks/growth.qmd
          - text: "Intertemporal Choice & Labor"
            href: tracks/intertemporal.qmd
          - text: "Business Cycles & Policy Dynamics"
            href: tracks/business_cycles.qmd
  sidebar:
    style: floating
    collapse-level: 2
    contents:
      - section: "Foundations"
        contents:
          - content/Preliminaries.qmd
      - section: "Measurement & National Accounts"
        contents:
          - content/measuring_gdp.qmd
          - content/realvsnom.qmd
          - content/two_goods_twoperiods.qmd
          - content/realgdpacross.qmd
      - section: "Growth & Long-Run Dynamics"
        contents:
          - content/foundations_growth.qmd
          - content/cobb_d_prod.qmd
          - content/solow_intro.qmd
          - content/solow_transition.qmd
          - "content/solow_pop&_tech_growth.qmd"
          - content/humancapital.qmd
          - content/convergence_hypo.qmd
          - content/solow_model.ipynb
          - content/romer_model.qmd
          - content/scale_effects.ipynb
          - content/hybrid_model.ipynb
          - content/growth_acc.qmd
          - content/slowinggrowth.ipynb
          - content/robots.ipynb
      - section: "Intertemporal Choice & Labor"
        contents:
          - content/two_period_consumption.qmd
          - content/labor_leisure_model.qmd
          - content/tobin_q_model.qmd
      - section: "Business Cycles & Policy Dynamics"
        contents:
          - content/is_curve_model.qmd
          - content/adassim.qmd
          - content/adas_model.ipynb
          - content/lucas_island_model.qmd
          - content/equilibrium_model.qmd
          - content/rbc_simulation.qmd

format:
  html:
    theme:
      light: [theme/intmacro-light.scss, theme/components.scss]
      dark: [theme/intmacro-dark.scss, theme/components.scss]
    toc: true
    toc-depth: 2
    code-tools: false
    mermaid:
      theme: neutral
    grid:
      sidebar-width: 250px
      body-width: 950px
      margin-width: 210px
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=STIX+Two+Math&family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    include-after-body:
      - theme/glossary-tooltips.js
      - theme/widget-fallback.js

execute:
  freeze: auto
  echo: false
  warning: false
